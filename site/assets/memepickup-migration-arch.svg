<rect x="240" y="635" width="160" height="44" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="320" y="651" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="rgb(68,68,65)">Anthropic</text>
<text x="320" y="667" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgb(95,94,90)">Claude line generation</text>

<rect x="420" y="635" width="160" height="44" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="500" y="651" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="rgb(68,68,65)">RevenueCat</text>
<text x="500" y="667" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgb(95,94,90)">Subscriptions + IAP</text>

<rect x="600" y="635" width="120" height="44" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="660" y="651" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="rgb(68,68,65)">Stripe</text>
<text x="660" y="667" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgb(95,94,90)">Web payments</text>

<!-- Migration Summary -->
<text x="390" y="715" text-anchor="middle" font-size="15" font-weight="600" fill="rgb(20,20,19)">Migration Summary</text>

<!-- Before -->
<rect x="60" y="732" width="310" height="190" rx="10" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="215" y="754" text-anchor="middle" font-size="13" font-weight="600" fill="rgb(68,68,65)">Before (Vercel + Supabase)</text>
<text x="80" y="778" font-size="11" fill="rgb(95,94,90)">Vercel Edge Functions — tRPC API</text>
<text x="80" y="798" font-size="11" fill="rgb(95,94,90)">Supabase PostgreSQL — 11 tables + RLS</text>
<text x="80" y="818" font-size="11" fill="rgb(95,94,90)">Supabase Auth — email/password JWT</text>
<text x="80" y="838" font-size="11" fill="rgb(95,94,90)">Supabase Storage — meme images</text>
<text x="80" y="858" font-size="11" fill="rgb(95,94,90)">RevenueCat + Stripe — payments</text>
<text x="80" y="878" font-size="11" fill="rgb(95,94,90)">OpenAI + Claude — AI generation</text>
<text x="80" y="904" font-size="12" font-weight="600" fill="rgb(68,68,65)">~$70/mo (Supabase $25 + Vercel $20 + AI)</text>

<!-- Arrow -->
<line x1="370" y1="827" x2="408" y2="827" stroke="rgb(216,90,48)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- After -->
<rect x="410" y="732" width="310" height="190" rx="10" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="565" y="754" text-anchor="middle" font-size="13" font-weight="600" fill="rgb(113,43,19)">After (10 AWS Services)</text>
<text x="430" y="778" font-size="11" fill="rgb(153,60,29)">Route 53, CloudFront, ACM</text>
<text x="430" y="798" font-size="11" fill="rgb(153,60,29)">API Gateway (REST), Lambda x6</text>
<text x="430" y="818" font-size="11" fill="rgb(153,60,29)">RDS PostgreSQL, Cognito</text>
<text x="430" y="838" font-size="11" fill="rgb(153,60,29)">S3 (2 buckets), VPC, NAT Gateway</text>
<text x="430" y="858" font-size="11" fill="rgb(153,60,29)">IAM — least privilege</text>
<text x="430" y="878" font-size="11" fill="rgb(153,60,29)">Terraform IaC (97 resources)</text>
<text x="430" y="904" font-size="12" font-weight="600" fill="rgb(113,43,19)">~$71/mo (free tier) / ~$86/mo after</text>

