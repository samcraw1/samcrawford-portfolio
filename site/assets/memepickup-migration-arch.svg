<text x="390" y="355" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgb(153,60,29)">get-memes | generate-meme | get-profile</text>
<text x="390" y="370" text-anchor="middle" dominant-baseline="central" font-size="10" fill="rgb(153,60,29)">save-favorite | get-subscription | post-confirmation</text>

