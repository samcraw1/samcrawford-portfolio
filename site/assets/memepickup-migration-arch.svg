<line x1="622" y1="515" x2="622" y2="565" stroke="rgb(115,114,108)" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="622" y1="565" x2="622" y2="600" stroke="rgb(115,114,108)" stroke-width="1" marker-end="url(#arrow)"/>
<text x="650" y="583" font-size="9" fill="rgb(115,114,108)">HTTPS</text>

