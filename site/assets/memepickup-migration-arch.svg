<text x="390" y="107" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(95,94,90)">iOS + Android (App Store / Play Store)</text>

<!-- Arrow: App → Route 53 -->
<line x1="390" y1="118" x2="390" y2="138" stroke="rgb(115,114,108)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Route 53 -->
<rect x="300" y="140" width="180" height="36" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
