<svg width="100%" viewBox="0 0 780 950" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; }
</style>

<!-- Title -->
<text x="390" y="32" text-anchor="middle" font-size="18" font-weight="600" fill="rgb(20,20,19)">MemePickup — Proposed AWS Backend Architecture</text>
<text x="390" y="52" text-anchor="middle" font-size="12" fill="rgb(115,114,108)">Mobile app backend migration from Vercel + Supabase (demo — not live)</text>

<!-- Mobile App -->
<rect x="290" y="74" width="200" height="44" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
