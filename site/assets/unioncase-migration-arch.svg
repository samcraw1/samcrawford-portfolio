<svg width="100%" viewBox="0 0 780 920" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: "Anthropic Sans", -apple-system, system-ui, "Segoe UI", sans-serif; }
</style>

<!-- Title -->
<text x="390" y="32" text-anchor="middle" font-size="18" font-weight="600" fill="rgb(20,20,19)">UnionCase — AWS Architecture</text>
<text x="390" y="52" text-anchor="middle" font-size="12" fill="rgb(115,114,108)">Union grievance tracking PWA migrated from Vercel + Supabase</text>

<!-- User / Browser -->
<rect x="315" y="74" width="150" height="40" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="390" y="98" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(68,68,65)">Browser</text>

<!-- Arrow: Browser → Route 53 -->
<line x1="390" y1="114" x2="390" y2="134" stroke="rgb(115,114,108)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Route 53 -->
<rect x="295" y="136" width="190" height="40" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="390" y="150" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(113,43,19)">Route 53</text>
<text x="390" y="166" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(153,60,29)">DNS — unioncase.org</text>

<!-- Arrow: Route 53 → CloudFront -->
<line x1="390" y1="176" x2="390" y2="196" stroke="rgb(115,114,108)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- CloudFront -->
<rect x="275" y="198" width="230" height="40" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="390" y="212" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(113,43,19)">CloudFront CDN</text>
<text x="390" y="228" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(153,60,29)">HTTPS + OAC + ACM certificate</text>

<!-- Arrow: CloudFront → S3 Frontend (left) -->
<line x1="330" y1="238" x2="170" y2="278" stroke="rgb(115,114,108)" stroke-width="1" marker-end="url(#arrow)"/>
<text x="230" y="254" text-anchor="middle" font-size="10" fill="rgb(115,114,108)">static files</text>

<!-- Arrow: CloudFront → API Gateway (right) -->
<line x1="450" y1="238" x2="610" y2="278" stroke="rgb(115,114,108)" stroke-width="1" marker-end="url(#arrow)"/>
<text x="548" y="254" text-anchor="middle" font-size="10" fill="rgb(115,114,108)">/api/* requests</text>

<!-- S3 Frontend -->
<rect x="60" y="280" width="220" height="40" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="170" y="294" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(113,43,19)">S3 — Frontend</text>
<text x="170" y="310" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(153,60,29)">React PWA (28 files, 57 MB)</text>

<!-- API Gateway -->
<rect x="500" y="280" width="220" height="40" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="610" y="294" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(113,43,19)">API Gateway (HTTP)</text>
<text x="610" y="310" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(153,60,29)">ANY /{proxy+} + CORS</text>

<!-- Arrow: API GW → Lambda -->
<line x1="610" y1="320" x2="610" y2="350" stroke="rgb(115,114,108)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Lambda -->
<rect x="490" y="352" width="240" height="48" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="610" y="368" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(113,43,19)">Lambda — Express API</text>
<text x="610" y="386" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(153,60,29)">Node.js 20 + Web Adapter layer</text>

<!-- VPC Box -->
<rect x="55" y="430" width="670" height="230" rx="10" fill="none" stroke="rgb(153,60,29)" stroke-width="0.5" stroke-dasharray="6 3"/>
<text x="75" y="450" font-size="12" font-weight="500" fill="rgb(153,60,29)">VPC 10.0.0.0/16</text>

<!-- Private Subnets Label -->
<text x="75" y="475" font-size="11" fill="rgb(115,114,108)">Private subnets (no internet)</text>

<!-- RDS -->
<rect x="80" y="490" width="280" height="56" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="220" y="510" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(113,43,19)">RDS PostgreSQL 16.4</text>
<text x="220" y="528" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(153,60,29)">db.t3.micro — 8 tables, encrypted</text>

<!-- Arrow: Lambda → RDS -->
<line x1="560" y1="400" x2="360" y2="508" stroke="rgb(115,114,108)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Cognito -->
<rect x="420" y="490" width="280" height="56" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="560" y="510" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(113,43,19)">Cognito User Pool</text>
<text x="560" y="528" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(153,60,29)">Email/password auth, JWT tokens</text>

<!-- Arrow: Lambda → Cognito -->
<line x1="610" y1="400" x2="580" y2="488" stroke="rgb(115,114,108)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- S3 Documents -->
<rect x="80" y="572" width="280" height="56" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="220" y="592" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(113,43,19)">S3 — Documents</text>
<text x="220" y="610" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(153,60,29)">Presigned URL uploads + CORS</text>

<!-- Arrow: Lambda → S3 Docs -->
<line x1="540" y1="400" x2="360" y2="590" stroke="rgb(115,114,108)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- EventBridge -->
<rect x="420" y="572" width="280" height="56" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="560" y="592" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(113,43,19)">EventBridge</text>
<text x="560" y="610" text-anchor="middle" dominant-baseline="central" font-size="11" fill="rgb(153,60,29)">Deadline + trial checks (daily cron)</text>

<!-- Arrow: EventBridge → Lambda -->
<line x1="610" y1="572" x2="610" y2="402" stroke="rgb(115,114,108)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="650" y="478" font-size="10" fill="rgb(115,114,108)" transform="rotate(-90,650,478)">scheduled</text>

<!-- IAM bar at bottom of VPC -->
<rect x="80" y="640" width="620" height="8" rx="4" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.3"/>
<text x="390" y="658" text-anchor="middle" font-size="10" fill="rgb(153,60,29)">IAM — least privilege roles + policies</text>

<!-- Migration summary section -->
<text x="390" y="700" text-anchor="middle" font-size="15" font-weight="600" fill="rgb(20,20,19)">Migration Summary</text>

<!-- Before column -->
<rect x="60" y="720" width="310" height="170" rx="10" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
<text x="215" y="742" text-anchor="middle" font-size="13" font-weight="600" fill="rgb(68,68,65)">Before (Vercel + Supabase)</text>
<text x="80" y="766" font-size="12" fill="rgb(95,94,90)">Vercel — frontend + serverless API</text>
<text x="80" y="786" font-size="12" fill="rgb(95,94,90)">Supabase — PostgreSQL database</text>
<text x="80" y="806" font-size="12" fill="rgb(95,94,90)">Vercel Blob — file uploads</text>
<text x="80" y="826" font-size="12" fill="rgb(95,94,90)">Custom JWT — bcrypt + jsonwebtoken</text>
<text x="80" y="846" font-size="12" fill="rgb(95,94,90)">Vercel Cron — scheduled tasks</text>
<text x="80" y="872" font-size="13" font-weight="600" fill="rgb(68,68,65)">$20-45/mo</text>

<!-- After column -->
<rect x="410" y="720" width="310" height="170" rx="10" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
<text x="565" y="742" text-anchor="middle" font-size="13" font-weight="600" fill="rgb(113,43,19)">After (10 AWS Services)</text>
<text x="430" y="766" font-size="12" fill="rgb(153,60,29)">Route 53, CloudFront, S3, ACM</text>
<text x="430" y="786" font-size="12" fill="rgb(153,60,29)">API Gateway, Lambda, RDS</text>
<text x="430" y="806" font-size="12" fill="rgb(153,60,29)">Cognito, EventBridge, IAM</text>
<text x="430" y="826" font-size="12" fill="rgb(153,60,29)">VPC with private subnets</text>
<text x="430" y="846" font-size="12" fill="rgb(153,60,29)">Full architectural control</text>
<text x="430" y="872" font-size="13" font-weight="600" fill="rgb(113,43,19)">~$2/mo (free tier) / ~$17/mo after</text>

<!-- Arrow between columns -->
<line x1="370" y1="805" x2="408" y2="805" stroke="rgb(216,90,48)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Footer -->
<text x="390" y="912" text-anchor="middle" font-size="11" fill="rgb(115,114,108)">Live at app.unioncase.org — migrated via AWS CLI in ~75 minutes</text>

</svg>
